<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thinkmate — Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7fafc;
      color: #2d3748;
      padding: 32px 40px;
      max-width: 100%;
      margin: 0 auto;
      line-height: 1.5;
    }

    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 28px; color: #6c63ff; font-weight: 700; letter-spacing: 1px; }
    .header p { color: #a0aec0; font-size: 14px; margin-top: 4px; }

    /* Responsive grid */
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
    .grid .full-width { grid-column: 1 / -1; }
    .grid .span-2 { grid-column: span 2; }

    @media (max-width: 1024px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
      .grid .full-width, .grid .span-2 { grid-column: 1; }
    }

    .section {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
    }

    .section h2 { font-size: 16px; font-weight: 600; color: #6c63ff; margin-bottom: 16px; }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label { display: block; font-size: 13px; color: #718096; margin-bottom: 6px; }

    select, input[type="text"], input[type="password"], textarea {
      width: 100%;
      padding: 10px 12px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #2d3748;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    textarea { min-height: 60px; resize: vertical; }

    select:focus, input:focus, textarea:focus { border-color: #6c63ff; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }

    .help-link { display: inline-block; margin-top: 6px; font-size: 12px; color: #6c63ff; text-decoration: none; }
    .help-link:hover { text-decoration: underline; }

    /* Profile grid */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .profile-grid .full { grid-column: 1 / -1; }

    /* Coach list */
    .coach-list { display: flex; flex-direction: column; gap: 8px; }

    .coach-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px;
    }

    .coach-info { display: flex; align-items: center; gap: 10px; }
    .coach-icon { font-size: 20px; }
    .coach-name { font-size: 14px; font-weight: 500; }
    .coach-desc { font-size: 11px; color: #a0aec0; }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #e2e8f0; border-radius: 22px; cursor: pointer; transition: background 0.2s ease;
    }

    .toggle-slider::before {
      content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px;
      background: #a0aec0; border-radius: 50%; transition: transform 0.2s ease, background 0.2s ease;
    }

    .toggle input:checked + .toggle-slider { background: rgba(108, 99, 255, 0.25); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #6c63ff; }

    .coach-settings {
      padding: 12px; margin-top: 8px;
      background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 8px; display: none;
    }
    .coach-settings.visible { display: block; }
    .coach-settings .field { margin-bottom: 12px; }

    .status-msg { text-align: center; font-size: 13px; color: #6c63ff; padding: 8px; opacity: 0; transition: opacity 0.3s ease; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #fff; border: 1px solid #6c63ff; border-radius: 8px; z-index: 100; }
    .status-msg.visible { opacity: 1; }

    .hidden { display: none; }

    /* Insights */
    .insight-list { display: flex; flex-direction: column; gap: 6px; }

    .insight-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px;
    }

    .insight-item .pattern { flex: 1; }
    .insight-item .count { color: #6c63ff; font-weight: 600; margin: 0 12px; font-size: 12px; }
    .insight-item .category { color: #a0aec0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    .insight-delete {
      background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 16px; padding: 0 4px;
    }
    .insight-delete:hover { color: #c53030; }

    .insight-empty { color: #a0aec0; font-size: 13px; text-align: center; padding: 12px; }

    .insight-strong {
      display: inline-block; background: rgba(56,161,105,0.1); color: #38a169;
      padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; margin: 2px 4px 2px 0;
    }

    .insight-usage {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 0; font-size: 13px; border-bottom: 1px solid #edf2f7;
    }
    .insight-usage:last-child { border-bottom: none; }

    .btn-row { display: flex; gap: 8px; margin-top: 16px; }

    .btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #e2e8f0;
      background: #edf2f7; color: #4a5568; transition: all 0.15s ease;
    }
    .btn:hover { background: #e2e8f0; }

    .btn-danger { border-color: #fed7d7; background: #fff5f5; color: #c53030; }
    .btn-danger:hover { background: #fed7d7; }

    .subsection { margin-top: 20px; padding-top: 16px; border-top: 1px solid #edf2f7; }
    .subsection h3 { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 10px; }

    .shortcut-hint { font-size: 12px; color: #a0aec0; margin-top: 8px; }
    .kbd { display: inline-block; background: #edf2f7; border: 1px solid #e2e8f0; border-radius: 4px; padding: 1px 6px; font-size: 11px; font-family: monospace; color: #4a5568; }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ Thinkmate</h1>
    <p>Your thinking partner</p>
  </div>

  <div class="grid">

    <!-- Column 1: Provider + UI Preferences -->
    <div>
      <div class="section" style="margin-bottom:24px;">
        <h2>AI Provider</h2>

        <div class="field">
          <label for="provider">Provider</label>
          <select id="provider">
            <option value="gemini">Gemini</option>
            <option value="openrouter">OpenRouter</option>
            <option value="ollama">Ollama (Local)</option>
          </select>
        </div>

        <div id="gemini-fields">
          <div class="field">
            <label for="gemini-key">API Key</label>
            <input type="password" id="gemini-key" placeholder="Enter your Gemini API key">
            <a class="help-link" href="https://aistudio.google.com/apikey" target="_blank">Get a free API key from Google AI Studio</a>
          </div>
          <div class="field">
            <label for="gemini-model">Model</label>
            <select id="gemini-model"></select>
          </div>
        </div>

        <div id="openrouter-fields" class="hidden">
          <div class="field">
            <label for="openrouter-key">API Key</label>
            <input type="password" id="openrouter-key" placeholder="Enter your OpenRouter API key">
            <a class="help-link" href="https://openrouter.ai/keys" target="_blank">Get an API key from OpenRouter</a>
          </div>
          <div class="field">
            <label for="openrouter-model">Model</label>
            <select id="openrouter-model"><option value="">Enter API key to load models...</option></select>
          </div>
        </div>

        <div id="ollama-fields" class="hidden">
          <div class="field">
            <label for="ollama-url">Base URL</label>
            <input type="text" id="ollama-url" placeholder="http://localhost:11434">
          </div>
          <div class="field">
            <label for="ollama-model">Model</label>
            <select id="ollama-model"><option value="">Click to load models...</option></select>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>UI Preferences</h2>
        <div class="field">
          <label for="panel-position">Panel Position</label>
          <select id="panel-position">
            <option value="cursor">Near Input (default)</option>
            <option value="anchored">Anchored (near input field)</option>
            <option value="fixed">Fixed Corner (bottom-right)</option>
            <option value="toolbar">Toolbar (click extension icon)</option>
          </select>
        </div>
        <div class="shortcut-hint">Keyboard shortcut: <span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">Y</span></div>
      </div>
    </div>

    <!-- Column 2: Coaches -->
    <div>
      <div class="section">
        <h2>Coaches</h2>
        <div id="coach-list" class="coach-list"></div>
      </div>
    </div>

    <!-- Column 3: Profile -->
    <div>
      <div class="section">
        <h2>Your Profile</h2>
        <div class="field">
          <label for="profile-name">Name</label>
          <input type="text" id="profile-name" placeholder="Your name">
        </div>
        <div class="field">
          <label for="profile-nationality">Nationality</label>
          <input type="text" id="profile-nationality" placeholder="e.g. Malaysian">
        </div>
        <div class="field">
          <label for="profile-language">Native Language</label>
          <input type="text" id="profile-language" placeholder="e.g. Malay">
        </div>
        <div class="field">
          <label for="profile-profession">Profession</label>
          <input type="text" id="profile-profession" placeholder="e.g. Software Engineer">
        </div>
        <div class="field">
          <label for="profile-seniority">Seniority</label>
          <select id="profile-seniority">
            <option value="">Select...</option>
            <option value="Junior">Junior</option>
            <option value="Mid">Mid</option>
            <option value="Senior">Senior</option>
            <option value="Lead">Lead</option>
            <option value="Manager">Manager</option>
          </select>
        </div>
        <div class="field">
          <label for="profile-style">Communication Style</label>
          <select id="profile-style">
            <option value="direct">Direct</option>
            <option value="formal">Formal</option>
            <option value="casual">Casual</option>
          </select>
        </div>
        <div class="field">
          <label for="profile-goals">Goals</label>
          <textarea id="profile-goals" placeholder="e.g. IELTS 8.0, Canada PR"></textarea>
        </div>
        <div class="field">
          <label for="profile-work">Work Context</label>
          <textarea id="profile-work" placeholder="e.g. Leading a team of 5"></textarea>
        </div>
      </div>
    </div>

    <!-- Full width: Insights -->
    <div class="section full-width">
      <h2>Insights</h2>

      <div class="grid" style="gap:16px;">
        <div>
          <h3 style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px;">Weak Areas</h3>
          <div id="insights-errors" class="insight-list"></div>
        </div>
        <div>
          <h3 style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px;">Strong Areas</h3>
          <div id="insights-strong"></div>
          <div style="margin-top:20px;">
            <h3 style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px;">Most Used Coaches</h3>
            <div id="insights-coaches"></div>
          </div>
        </div>
        <div>
          <h3 style="font-size:13px;font-weight:600;color:#4a5568;margin-bottom:10px;">Most Used Sites</h3>
          <div id="insights-sites"></div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn" id="btn-export">Export Data as JSON</button>
        <button class="btn btn-danger" id="btn-clear">Clear All Memory</button>
      </div>
    </div>

  </div>

  <div class="status-msg" id="status-msg">Settings saved</div>

  <script src="options.js" type="module"></script>
</body>
</html>
